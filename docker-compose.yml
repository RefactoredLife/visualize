services:
  visualize:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: visualize
    image: visualize:latest
    environment:
      - SECRET_CACHE_BASE_URL=${SECRET_CACHE_BASE_URL}
    ports:
      - "8501:8501"
    volumes:
      - .streamlit:/app/.streamlit:ro # To enable dark/light mode
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    external: true 
    #driver: bridge
    #name: homelab_appnet